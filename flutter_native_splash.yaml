flutter_native_splash:
  # Background color
  color: "#09090A"

  # Splash image
  image: assets/images/app/splash.png

  # Disable full screen mode on Android
  fullscreen: false

  # Android 12+ specific (has its own splash API)
  android_12:
    color: "#09090A"
    image: assets/images/app/splash.png
    icon_background_color: "#09090A"

  # Platforms
  ios: true
  android: true

  # Keep splash until app is ready
  android_gravity: center
  ios_content_mode: center
