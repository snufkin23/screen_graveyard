flutter_native_splash:
  # Background color
  color: "#FFFFFF"

  # Splash image
  image: assets/images/splash_logo.png

  # Disable full screen mode on Android
  fullscreen: false

  # Android 12+ specific (has its own splash API)
  android_12:
    color: "#FFFFFF"
    image: assets/images/splash_logo.png
    icon_background_color: "#FFFFFF"

  # Platforms
  ios: true
  android: true

  # Keep splash until app is ready
  android_gravity: center
  ios_content_mode: center