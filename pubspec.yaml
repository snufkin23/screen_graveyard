name: screen_graveyard
description: "A new app"
publish_to: "none"
version: 1.0.0+19

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.41.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── UI ─────────────────────────────────────────
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  flutter_screenutil_plus: ^1.5.0
  flutter_native_splash: ^2.4.0
  flutter_gen: ^5.4.0
  nested: ^1.0.0

  # ── State ──────────────────────────────────────
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0

  # ── DI ─────────────────────────────────────────
  get_it: ^9.2.1
  injectable: ^2.4.4

  # ── Routing ────────────────────────────────────
  auto_route: ^11.1.0

  # ── Network (REST) ─────────────────────────────
  dio: ^5.4.3
  connectivity_plus: ^7.0.0

  # ── Network (GraphQL) ──────────────────────────
  ferry: ^0.16.1+2
  gql_dio_link: ^2.0.0

  # ── Storage ────────────────────────────────────
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.0
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.3

  # ── Serialization ──────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ── Utils ──────────────────────────────────────
  logger: ^2.0.2+1
  package_info_plus: ^9.0.0
  envied: ^1.3.3
  intl: ^0.20.2
  permission_handler: ^12.0.1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  firebase_core: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generation ────────────────────────────
  build_runner: ^2.11.1
  injectable_generator: ^2.6.2
  auto_route_generator: ^10.5.0
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  hive_ce_generator: ^1.11.0
  flutter_gen_runner: ^5.4.0
  envied_generator: ^1.3.3
  intl_utils: ^2.8.7

  # ── Build & Icons ──────────────────────────────
  flutter_launcher_icons: ^0.14.4

  # ── Testing ────────────────────────────────────
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  config:
    enable-swift-package-manager: true
  assets:
    - assets/images/
    - assets/icons/

flutter_gen:
  output: lib/gen/
  integrations:
    flutter_svg: true

flutter_intl:
  enabled: true
  class_name: AppLocalizations
  main_locale: en
  arb_dir: lib/localization/arb
  output_dir: lib/localization/generated
